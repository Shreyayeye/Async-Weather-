<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Async Weather Tracker</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div class="container">
        <h1>⛅ Async Weather Tracker</h1>

        <div class="top-row">

            <!-- Left Panel: Search + History -->
            <div class="card search-card">
                <div class="card-title">Search City</div>
                <div class="search-row">
                    <input type="text" id="cityInput" placeholder="Delhi, London..." />
                    <button class="btn-search" onclick="handleSearch()">Search</button>
                </div>

                <div class="card-title">Search History</div>
                <div class="history-pills" id="historyContainer"></div>
            </div>

            <!-- Right Panel: Weather Info -->
            <div class="card weather-card">
                <div class="card-title">Weather Info</div>
                <div id="weatherOutput">
                    <span class="weather-placeholder">Enter a city to see weather</span>
                </div>
            </div>

        </div>

        <!-- Bottom Panel: Console / Event Loop Visualiser -->
        <div class="card console-card">
            <div class="card-title">Console – Event Loop</div>
            <div class="console-box" id="consoleBox"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
